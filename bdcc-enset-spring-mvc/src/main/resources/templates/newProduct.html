<!DOCTYPE html>
<html lang="en"
      xmlns:th="http..//www.tymeleaf.org"
      xmlns:layout="http:://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout"
>
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" type="text/css" href="/webjars/bootstrap/5.1.1/css/bootstrap.min.css">
</head>
<body>
<div class="p-3" layout:fragment="content">
    <form method="post" th:action="@{/admin/saveProduct}">
        <div class= "mb-3">
            <label class="form-label">Name</label>
            <input class="form-comtrol" type="text" name="name" th:value="${product.name}">
            <span class="text-danger" th:errors="${product.name}"></span>
        </div>

        <div class= "mb-3">
            <label class="form-label">Price</label>
            <input class="form-comtrol" type="text" name="price" th:value="${product.price}">
            <span class="text-danger" th:errors="${product.price}"></span>
        </div>

        <div class= "mb-3">
            <label class="form-label">Quantite</label>
            <input class="form-comtrol" type="text" name="quantity" th:value="${product.quantity}">
            <span class="text-danger" th:errors="${product.quantity}"></span>
        </div>
        <button type="submit" class="btn btn-primary">Save</button>

    </form>


</div>
</body>
</html>
